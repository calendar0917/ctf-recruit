services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ctf_recruit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ctf_recruit"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      [
        "sh",
        "-lc",
        "for f in /migrations/*.up.sql; do echo \"applying $$f\"; psql -h postgres -U postgres -d ctf_recruit -v ON_ERROR_STOP=1 -f \"$$f\"; done"
      ]
    restart: "no"

  backend:
    build:
      context: ./backend
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        ALL_PROXY: ${ALL_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis,backend,frontend}
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    env_file:
      - ./backend/.env.example
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ./backend
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        ALL_PROXY: ${ALL_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis,backend,frontend,worker}
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    env_file:
      - ./backend/.env.example
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["/bin/worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:${BACKEND_PORT:-18080}}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:${BACKEND_PORT:-18080}}
    ports:
      - "${FRONTEND_PORT:-13001}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:

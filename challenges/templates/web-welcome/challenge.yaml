meta:
  slug: web-welcome
  title: Welcome Panel
  category: web
  points: 100
  difficulty: easy
  dynamic: true
  visible: true
  sort_order: 10

flag:
  type: static
  value: flag{welcome}

content:
  description: A minimal seeded web challenge for local runtime integration.
  author: platform

runtime:
  image: ctf/web-welcome:dev
  mode: per-user
  expose: http
  container_port: 80
  ttl: 30m
  memory_limit_mb: 256
  cpu_limit_millicores: 500
  max_renew_count: 1
  max_active_instances: 0
  user_cooldown: 0s
  env:
    MODE: dev
  command:

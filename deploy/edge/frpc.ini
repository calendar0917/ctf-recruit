[common]
server_addr = YOUR_VPS_IP
server_port = 7000

# Tunnel the internal gateway (port 80 on internal) to a local port on the VPS.
[ctf_gateway]
type = tcp
local_ip = 127.0.0.1
local_port = 80
remote_port = 18080

# Dynamic instance port-range forwarding.
# The internal runtime must allocate ports from the same range.
[ctf_instances]
type = tcp
local_ip = 127.0.0.1
local_port = 20000
remote_port = 20000

[ctf_instances_2]
type = tcp
local_ip = 127.0.0.1
local_port = 20001
remote_port = 20001

# Repeat up to 20499.
# You can generate the blocks with a small script on your machine.


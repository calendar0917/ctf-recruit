services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ctf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    image: golang:1.26-alpine
    working_dir: /app/backend
    command: ["go", "run", "./cmd/api"]
    environment:
      HTTP_ADDR: ":8080"
      APP_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ctf?sslmode=disable
      # Development-only placeholder. Non-development APP_ENV values now reject this.
      JWT_SECRET: dev-only-insecure-jwt-secret
      INSTANCE_SWEEPER_POLL_INTERVAL: 30s
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      PUBLIC_BASE_URL: http://localhost:8080
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      REDIS_KEY_PREFIX: ctf:
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: 60
      LOGIN_RATE_LIMIT_MAX: 10
      REGISTER_RATE_LIMIT_WINDOW_SECONDS: 300
      REGISTER_RATE_LIMIT_MAX: 5
      SUBMISSION_RATE_LIMIT_WINDOW_SECONDS: 60
      SUBMISSION_RATE_LIMIT_MAX: 10
      ADMIN_WRITE_RATE_LIMIT_WINDOW_SECONDS: 60
      ADMIN_WRITE_RATE_LIMIT_MAX: 30
    volumes:
      - ..:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:24-alpine
    profiles: ["ui"]
    working_dir: /app/frontend
    command: ["sh", "-lc", "pnpm install && pnpm dev --host 0.0.0.0 --port 3000"]
    environment:
      PNPM_HOME: /root/.local/share/pnpm
    volumes:
      - ..:/app
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:

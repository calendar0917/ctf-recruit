services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ctf"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      APP_ENV: production
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/ctf?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_TTL: 24h
      INSTANCE_SWEEPER_POLL_INTERVAL: 30s
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}
      RUNTIME_PUBLIC_BASE_URL: ${RUNTIME_PUBLIC_BASE_URL:-${PUBLIC_BASE_URL}}
      RUNTIME_PORT_MIN: ${RUNTIME_PORT_MIN:-0}
      RUNTIME_PORT_MAX: ${RUNTIME_PORT_MAX:-0}
      RUNTIME_BIND_ADDR: ${RUNTIME_BIND_ADDR:-127.0.0.1}
      ATTACHMENT_STORAGE_DIR: /var/lib/ctf/attachments
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
      REDIS_KEY_PREFIX: "ctf:"
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: 60
      LOGIN_RATE_LIMIT_MAX: 10
      REGISTER_RATE_LIMIT_WINDOW_SECONDS: 300
      REGISTER_RATE_LIMIT_MAX: 5
      SUBMISSION_RATE_LIMIT_WINDOW_SECONDS: 60
      SUBMISSION_RATE_LIMIT_MAX: 10
      ADMIN_WRITE_RATE_LIMIT_WINDOW_SECONDS: 60
      ADMIN_WRITE_RATE_LIMIT_MAX: 30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - attachments-data:/var/lib/ctf/attachments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

  gateway:
    image: nginx:1.29-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  attachments-data:
